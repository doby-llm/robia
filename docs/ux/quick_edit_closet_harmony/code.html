<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Quick Edit - Closet Harmony</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config = {darkMode: "class", theme: {extend: {colors: {"on-secondary-fixed-variant": "#4d4d4d", "inverse-surface": "#303030", "primary-container": "#4a4a4a", "error-container": "#ffdad6", "surface-bright": "#faf9f7", "surface-container-lowest": "#ffffff", "secondary-fixed": "#e0e0e0", "on-tertiary-fixed": "#1a1a1a", "on-tertiary-container": "#e0e0e0", "primary-fixed": "#e0e0e0", "on-error-container": "#93000a", "on-tertiary-fixed-variant": "#4d4d4d", "on-background": "#1c1b1f", "tertiary-fixed-dim": "#c2c2c2", outline: "#79747e", "inverse-on-surface": "#f2f0f4", tertiary: "#4d4d4d", "inverse-primary": "#c2c2c2", surface: "#faf9f7", "on-surface-variant": "#49454f", "secondary-fixed-dim": "#c2c2c2", error: "#ba1a1a", "on-surface": "#1c1b1f", "surface-dim": "#dadad8", "on-error": "#ffffff", "tertiary-fixed": "#e0e0e0", "secondary-container": "#e0e0e0", "on-secondary-fixed": "#1a1a1a", "on-primary-fixed-variant": "#4d4d4d", "surface-container-high": "#ebeae8", "primary-fixed-dim": "#c2c2c2", "on-primary-container": "#ffffff", "surface-variant": "#e7e0ec", "surface-container-low": "#f4f3f1", secondary: "#5e5e5e", "tertiary-container": "#5e5e5e", "surface-container-highest": "#e4e2e0", "surface-tint": "#2d2e32", "on-primary": "#ffffff", "outline-variant": "#cac4d0", "on-secondary": "#ffffff", primary: "#2d2e32", "on-tertiary": "#ffffff", "on-secondary-container": "#1a1a1a", "surface-container": "#f0efed", background: "#faf9f7", "on-primary-fixed": "#1a1a1a"}, borderRadius: {DEFAULT: "0.5rem", lg: "0.5rem", xl: "0.75rem", full: "9999px"}, spacing: {}, fontFamily: {headline: ["Inter"], display: ["Inter"], body: ["Inter"], label: ["Inter"]}, fontSize: {}}}};</script>
<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }
        /* Hide scrollbar for clean UI */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col pb-[100px] md:pb-0">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface-dim flex items-center justify-between px-4 md:px-8 h-16 w-full z-50 sticky top-0 transition-colors duration-200 flat no shadows">
<div class="flex items-center gap-3">
<button class="text-primary hover:bg-surface-variant/50 p-2 rounded-full transition-colors duration-200">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline text-xl font-bold text-primary">Quick Edit</h1>
</div>
</header>
<!-- Main Content Layout -->
<main class="flex-1 w-full max-w-lg mx-auto px-4 py-6 flex flex-col gap-6 md:max-w-2xl">
<!-- Image Preview Area -->
<div class="bg-surface-container-lowest rounded-2xl shadow-[0_2px_8px_rgba(0,0,0,0.04)] overflow-hidden flex flex-col h-[400px] md:h-[500px] relative border border-surface-variant/50">
<!-- Image -->
<div class="flex-1 relative flex items-center justify-center p-6 overflow-hidden">
<!-- Checkered background pattern to imply transparency/background removal -->
<div class="absolute inset-0 opacity-30" style="background-image: radial-gradient(theme('colors.outline-variant') 1px, transparent 1px); background-size: 16px 16px;"></div>
<!-- The Item Being Captured -->
<img alt="Garment Preview" class="relative z-10 max-h-full max-w-full object-contain drop-shadow-lg" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAUpGQTJm9eD3vYxjxYM6MF8E5Y_d1aWOuHN4VitSHFKgcpimKdJGvYB-3DVlEyWjf0blBlx3fnJ2AEBIiM_Oo17XQ6c38EzbloAIAF7DJ-pDu57ngtE6lDlaCqeQFDYdVzenox-Ct_crVz1bgdqz5gUha_A1vHNPvmBuBqkJFs1tXLrnqATgNlkEjHCc0R3-pGRehmElQl5-m0vRTFkJYKQQJQi5YKG4IjKv13zXBqCD2yvTgQflrc_i9ewv03M2CCVl-h7_Kt45M"/>
<!-- Overlay Controls (Undo, Reset) -->
<div class="absolute top-4 right-4 z-20 flex gap-2">
<button class="bg-surface/90 backdrop-blur-md text-on-surface hover:bg-surface p-2 rounded-full shadow-sm border border-surface-variant transition-colors duration-200 flex items-center justify-center" title="Undo">
<span class="material-symbols-outlined text-[20px]">undo</span>
</button>
<button class="bg-surface/90 backdrop-blur-md text-on-surface hover:bg-surface px-4 py-1.5 rounded-full shadow-sm border border-surface-variant transition-colors duration-200 flex items-center justify-center font-label text-sm font-semibold" title="Reset">
    Reset
</button>
</div>
</div>
</div>
<!-- Active Tool Area (Temperature Swatches) -->
<div class="flex flex-col gap-3 px-2">
<div class="flex justify-between items-center">
<span class="font-label text-sm font-semibold text-on-surface">Temperature</span>
<span class="font-label text-xs text-on-surface-variant font-medium">Daylight</span>
</div>
<div class="flex gap-4 justify-between md:justify-center md:gap-8 px-2">
<!-- Warm -->
<button class="flex flex-col items-center gap-2 group focus:outline-none">
<div class="w-12 h-12 rounded-full bg-[#ffecd2] border border-outline-variant shadow-sm group-active:scale-95 transition-transform"></div>
<span class="font-label text-[11px] font-medium text-on-surface-variant">Warm</span>
</button>
<!-- Neutral -->
<button class="flex flex-col items-center gap-2 group focus:outline-none">
<div class="w-12 h-12 rounded-full bg-[#fcfbfa] border border-outline-variant shadow-sm group-active:scale-95 transition-transform"></div>
<span class="font-label text-[11px] font-medium text-on-surface-variant">Neutral</span>
</button>
<!-- Cool -->
<button class="flex flex-col items-center gap-2 group focus:outline-none">
<div class="w-12 h-12 rounded-full bg-[#e8f1f8] border border-outline-variant shadow-sm group-active:scale-95 transition-transform"></div>
<span class="font-label text-[11px] font-medium text-on-surface-variant">Cool</span>
</button>
<!-- Daylight (Selected) -->
<button class="flex flex-col items-center gap-2 group focus:outline-none">
<div class="w-12 h-12 rounded-full bg-[#ffffff] border-2 border-primary shadow-sm ring-2 ring-primary/20 ring-offset-2 ring-offset-background group-active:scale-95 transition-transform scale-105"></div>
<span class="font-label text-[11px] font-bold text-primary">Daylight</span>
</button>
</div>
</div>
<!-- Bottom Adjustment Bar (Tool Icons) -->
<div class="bg-surface-container rounded-2xl p-2 flex justify-around items-center shadow-sm">
<button class="flex flex-col items-center justify-center p-3 rounded-xl text-on-surface-variant hover:bg-surface-variant transition-colors flex-1">
<span class="material-symbols-outlined text-2xl">brightness_6</span>
<span class="font-label text-[11px] mt-1 font-medium">Brightness</span>
</button>
<button class="flex flex-col items-center justify-center p-3 rounded-xl bg-primary text-on-primary shadow-md transition-colors flex-1">
<span class="material-symbols-outlined text-2xl" style='font-variation-settings: "FILL" 1;'>thermostat</span>
<span class="font-label text-[11px] mt-1 font-semibold">Temperature</span>
</button>
<button class="flex flex-col items-center justify-center p-3 rounded-xl text-on-surface-variant hover:bg-surface-variant transition-colors flex-1">
<span class="material-symbols-outlined text-2xl">ink_eraser</span>
<span class="font-label text-[11px] mt-1 font-medium">Eraser</span>
</button>
</div>
<!-- Action Area -->
<div class="mt-auto pt-2 flex gap-4">
<button class="flex-1 font-label text-sm font-semibold border border-outline text-on-surface py-3.5 rounded-xl hover:bg-surface-variant/50 transition-colors">Cancel</button>
<button class="flex-[2] font-label text-sm font-semibold bg-primary text-on-primary py-3.5 rounded-xl shadow-[0_4px_12px_rgba(45,46,50,0.2)] hover:bg-surface-tint transition-colors">Done</button>
</div>
</main>
</body></html>
