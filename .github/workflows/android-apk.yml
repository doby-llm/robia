name: Android APK CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Set up Python for TFLite drift check
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install TFLite drift check dependencies
        run: python -m pip install --upgrade pip numpy==1.26.4 tflite-runtime==2.14.0

      - name: Check bundled TFLite model drift
        run: python scripts/check_additional_info_tflite_drift.py

      - name: Build debug APK
        run: gradle --no-daemon assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: robia-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
