name: Android APK CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Set up Python for TFLite drift check
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install TFLite drift check dependencies
        run: python -m pip install --upgrade pip numpy==1.26.4 tflite-runtime==2.14.0

      - name: Check bundled TFLite model drift
        run: python scripts/check_additional_info_tflite_drift.py

      - name: Configure stable CI debug signing key
        run: |
          set -euo pipefail
          if [ -z "${ROBIA_DEBUG_KEYSTORE_BASE64:-}" ]; then
            echo "No stable CI debug keystore secret configured; Gradle will use the default debug signing key."
            exit 0
          fi
          for required in ROBIA_DEBUG_KEYSTORE_PASSWORD ROBIA_DEBUG_KEY_ALIAS ROBIA_DEBUG_KEY_PASSWORD; do
            if [ -z "${!required:-}" ]; then
              echo "${required} is required when ROBIA_DEBUG_KEYSTORE_BASE64 is set" >&2
              exit 1
            fi
          done
          signing_dir="${RUNNER_TEMP}/robia-debug-signing"
          mkdir -p "${signing_dir}"
          keystore_path="${signing_dir}/robia-ci-debug.jks"
          printf '%s' "${ROBIA_DEBUG_KEYSTORE_BASE64}" | base64 --decode > "${keystore_path}"
          chmod 600 "${keystore_path}"
          echo "ROBIA_DEBUG_KEYSTORE_PATH=${keystore_path}" >> "${GITHUB_ENV}"
          echo "ROBIA_DEBUG_KEYSTORE_PASSWORD=${ROBIA_DEBUG_KEYSTORE_PASSWORD}" >> "${GITHUB_ENV}"
          echo "ROBIA_DEBUG_KEY_ALIAS=${ROBIA_DEBUG_KEY_ALIAS}" >> "${GITHUB_ENV}"
          echo "ROBIA_DEBUG_KEY_PASSWORD=${ROBIA_DEBUG_KEY_PASSWORD}" >> "${GITHUB_ENV}"
          echo "Stable CI debug signing key configured. Register this SHA-1 for GitHub Actions debug APK OAuth testing:"
          keytool -list -v \
            -keystore "${keystore_path}" \
            -storepass "${ROBIA_DEBUG_KEYSTORE_PASSWORD}" \
            -alias "${ROBIA_DEBUG_KEY_ALIAS}" | grep -E 'SHA1:|SHA256:'
        env:
          ROBIA_DEBUG_KEYSTORE_BASE64: ${{ secrets.ROBIA_DEBUG_KEYSTORE_BASE64 }}
          ROBIA_DEBUG_KEYSTORE_PASSWORD: ${{ secrets.ROBIA_DEBUG_KEYSTORE_PASSWORD }}
          ROBIA_DEBUG_KEY_ALIAS: ${{ secrets.ROBIA_DEBUG_KEY_ALIAS }}
          ROBIA_DEBUG_KEY_PASSWORD: ${{ secrets.ROBIA_DEBUG_KEY_PASSWORD }}

      - name: Build debug APK
        run: gradle --no-daemon assembleDebug

      - name: Print APK signing certificate fingerprints
        run: |
          set -euo pipefail
          apk_path="$(find app/build/outputs/apk/debug -name '*.apk' -type f | sort | head -n 1)"
          if [ -z "${apk_path}" ]; then
            echo "No debug APK found for signing certificate inspection" >&2
            exit 1
          fi
          build_tools_dir="$(find "${ANDROID_HOME}/build-tools" -maxdepth 1 -mindepth 1 -type d | sort -V | tail -n 1)"
          echo "Inspecting signing certificate for ${apk_path}"
          echo "This fingerprint is safe to publish, but the default GitHub Actions debug signing key can change between runs."
          echo "For Google OAuth, use this only for the exact debug APK/build you are testing; use Play/release signing fingerprints for production."
          "${build_tools_dir}/apksigner" verify --print-certs "${apk_path}"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: robia-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
